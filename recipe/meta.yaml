{% set name = "h5grove" %}
{% set version = "3.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/h5grove-{{ version }}.tar.gz
  sha256: c29e4068e8c292357e9b8b595c369921bba496aae1de2db7c04edd2e4bcde43b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - orjson
    - h5py >=3
    - tifffile
    - typing-extensions

test:
  imports:
    - h5grove
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/silx-kit/h5grove
  summary: Core utilities to serve HDF5 file contents
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - t20100
    - loichuder
